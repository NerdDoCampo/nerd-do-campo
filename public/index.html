<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B3D2E" />
    <meta name="description" content="Nerd do Campo - Estatísticas de Futebol Amador" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nerd do Campo" />
    
    <!-- Ícones Apple -->
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    
    <!-- Splash screen iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="shortcut icon" href="/icons/icon-96.png" />
    
    <title>Nerd do Campo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0B3D2E; margin: 0; overscroll-behavior: none; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #103D2A; }
      ::-webkit-scrollbar-thumb { background: #1F5C3E; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #E8A020; }
      /* iOS safe area */
      #root { padding-top: env(safe-area-inset-top); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  </head>
  <body>
    <noscript>Habilite o JavaScript para usar este app.</noscript>
    <div id="root"></div>
    <script>
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW erro:', err));
        });
      }
    </script>
  </body>
</html>
