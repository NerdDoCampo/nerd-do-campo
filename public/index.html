<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B3D2E" />
    <meta name="description" content="Nerd do Campo - Estatísticas de Futebol Amador" />
    
    <!-- Open Graph / cartão de compartilhamento (WhatsApp, Facebook, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nerd do Campo" />
    <meta property="og:title" content="Nerd do Campo — Gestão completa do seu time amador" />
    <meta property="og:description" content="Estatísticas, financeiro, presença e eventos do seu time amador num lugar só. E o melhor: 100% grátis." />
    <meta property="og:image" content="https://nerddocampo.com.br/og-image.png?v=1" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://nerddocampo.com.br" />
    <meta property="og:locale" content="pt_BR" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nerd do Campo — Gestão completa do seu time amador" />
    <meta name="twitter:description" content="Estatísticas, financeiro, presença e eventos do seu time amador num lugar só. E o melhor: 100% grátis." />
    <meta name="twitter:image" content="https://nerddocampo.com.br/og-image.png?v=1" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nerd do Campo" />
    
    <!-- Ícones Apple -->
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    
    <!-- Splash screen iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="shortcut icon" href="/icons/icon-96.png" />
    
    <title>Nerd do Campo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700;800&display=swap" rel="stylesheet" />
    
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0B3D2E; margin: 0; overscroll-behavior: none; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #103D2A; }
      ::-webkit-scrollbar-thumb { background: #1F5C3E; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #E8A020; }
      /* iOS safe area */
      #root { padding-top: env(safe-area-inset-top); }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      /* Responsivo: Admin em telas estreitas */
      @media (max-width: 768px) {
        .admin-layout { flex-direction: column !important; }
        .admin-sidebar {
          width: 100% !important;
          height: auto !important;
          position: static !important;
          display: flex !important;
          flex-direction: row !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          border-right: none !important;
          border-bottom: 1px solid #1F5C3E !important;
          padding: 8px !important;
          gap: 4px;
          -webkit-overflow-scrolling: touch;
        }
        .admin-sidebar > * { flex-shrink: 0; }
        .admin-sidebar button {
          white-space: nowrap;
          border-left: none !important;
          border-bottom: 3px solid transparent;
          width: auto !important;
          padding: 8px 14px !important;
        }
        .admin-sidebar .menu-grupo { display: flex; flex-direction: row; align-items: center; }
        .admin-sidebar .menu-grupo-titulo { display: none !important; }
        .admin-main { padding: 16px 14px !important; }
        .admin-header { padding: 0 12px !important; gap: 8px !important; }
        /* Formulários: grids de 2+ colunas empilham em 1 coluna no mobile */
        .form-grid-2, .form-grid-auto { grid-template-columns: 1fr !important; }
      }
      @media (max-width: 480px) {
        .header-time-nome { display: none !important; }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  </head>
  <body>
    <noscript>Habilite o JavaScript para usar este app.</noscript>
    <div id="root"></div>
    <script>
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.log('SW erro:', err));
        });
      }
    </script>
  </body>
</html>
